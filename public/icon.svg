<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners for app icon feel -->
  <rect width="512" height="512" rx="96" fill="#09090b"/>

  <!-- "9" large -->
  <text x="160" y="310" font-family="Arial, Helvetica, sans-serif" font-size="260" font-weight="800" fill="#f97316" text-anchor="middle" dominant-baseline="middle">9</text>

  <!-- "to" smaller -->
  <text x="295" y="220" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">to</text>

  <!-- "Fit" bold -->
  <text x="390" y="330" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="800" fill="#f97316" text-anchor="middle" dominant-baseline="middle">Fit</text>
</svg>
