<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f97316">
  <title>9toFit - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #09090b;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      flex-direction: column;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      opacity: 0.7;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ffffff;
    }

    p {
      font-size: 16px;
      color: #a1a1a1;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .offline-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(249, 115, 22, 0.1);
      border: 1px solid #f97316;
      border-radius: 8px;
      padding: 12px 20px;
      margin-bottom: 40px;
      font-size: 14px;
      color: #f97316;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: #f97316;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.4;
      }
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: #f97316;
      color: #09090b;
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:active {
      transform: scale(0.98);
      background-color: rgba(255, 255, 255, 0.15);
    }

    .tips {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }

    .tips h3 {
      font-size: 14px;
      color: #a1a1a1;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tips ul {
      list-style: none;
      font-size: 14px;
      color: #757575;
      line-height: 1.8;
    }

    .tips li {
      margin-bottom: 8px;
    }

    .tips li:before {
      content: "→ ";
      color: #f97316;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" fill="#09090b"/>
      <circle cx="256" cy="256" r="200" fill="#f97316"/>
      <text x="256" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="#09090b" text-anchor="middle" dominant-baseline="middle">9</text>
      <text x="256" y="420" font-family="Arial, sans-serif" font-size="60" font-weight="600" fill="#f97316" text-anchor="middle" dominant-baseline="middle">toFit</text>
    </svg>

    <div class="offline-indicator">
      <div class="dot"></div>
      <span>Je bent offline</span>
    </div>

    <h1>Geen internetverbinding</h1>
    <p>Controleer je internetverbinding om de app opnieuw te gebruiken.</p>

    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">Pagina vernieuwen</button>
      <button class="btn-secondary" onclick="goToDashboard()">Ga naar dashboard</button>
    </div>

    <div class="tips">
      <h3>Wat je kunt proberen:</h3>
      <ul>
        <li>Controleer je WiFi-verbinding</li>
        <li>Zet vliegtuigmodus uit</li>
        <li>Verplaats je dichter bij de router</li>
        <li>Start je apparaat opnieuw op</li>
      </ul>
    </div>
  </div>

  <script>
    function goToDashboard() {
      window.location.href = '/portal/dashboard';
    }

    // Try to reconnect when online
    window.addEventListener('online', () => {
      console.log('Back online!');
      location.reload();
    });

    // Attempt to load the page periodically
    setInterval(() => {
      fetch('/').then(() => {
        location.reload();
      }).catch(() => {
        // Still offline
      });
    }, 5000);
  </script>
</body>
</html>
